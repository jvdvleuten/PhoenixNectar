name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift (Linux)
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Swift Version
        run: swift --version

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Run Tests
        run: swift test --parallel

  test-macos:
    name: Test (macOS)
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift (macOS)
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Swift Version
        run: swift --version

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Run Tests
        run: swift test --parallel
